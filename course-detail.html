<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Detail — LearnFlow</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="logo">Learn<span>Flow</span></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="courses.html">Courses</a>
    <a href="dashboard.html">My Courses <span class="badge" id="navBadge">0</span></a>
  </div>
</nav>

<!-- HERO -->
<div class="detail-hero">
  <a href="courses.html" class="back-link">← Back to Courses</a>
  <div id="heroArea"></div>
</div>

<!-- MAIN LAYOUT -->
<div class="detail-layout">
  <!-- LEFT: lesson list -->
  <div>
    <div id="completeBadge"></div>
    <div class="lessons-section">
      <h3 id="lessonHeading">Course Curriculum</h3>
      <div id="lessonList"></div>
    </div>
  </div>

  <!-- RIGHT: sidebar -->
  <div class="sidebar">
    <div class="sidebar-icon" id="sideIcon"></div>
    <button class="btn btn-primary btn-full" id="enrollBtn">Loading…</button>
    <div class="sidebar-rows" id="sideRows"></div>
    <div id="sideProgress"></div>
    <div id="sideCert"></div>
  </div>
</div>

<footer>Online Learning Platform Project &nbsp;·&nbsp; <span>LearnFlow</span></footer>

<div class="toast" id="toast">
  <span class="toast-icon" id="toastIcon">🎉</span>
  <span id="toastMsg"></span>
</div>

<script src="js/data.js"></script>
<script>
  // Get course id from URL ?id=1
  const params  = new URLSearchParams(location.search);
  const cId     = parseInt(params.get('id'));
  const course  = COURSES.find(c => c.id === cId);

  // If course not found, redirect
  if (!course) {
    document.body.innerHTML =
      '<div style="text-align:center;padding:100px;color:#6B6B9A">Course not found. <a href="courses.html" style="color:#6C63FF">← Go back</a></div>';
    throw new Error('Course not found');
  }

  document.title = course.title + ' — LearnFlow';

  // ── Toast helper ──
  function toast(msg, icon = '✓') {
    document.getElementById('toastMsg').textContent  = msg;
    document.getElementById('toastIcon').textContent = icon;
    const el = document.getElementById('toast');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  // ── Main render function ──
  function render() {
    const enrolled  = Storage.isEnrolled(cId);
    const completed = Storage.getCompletedLessons(cId);
    const pct       = Storage.getPercent(cId);

    // Nav badge
    document.getElementById('navBadge').textContent = Storage.getEnrolled().length;

    // ── Hero area ──
    document.getElementById('heroArea').innerHTML = `
      <div class="card-tags" style="margin-bottom:12px;">
        <span class="tag tag-cat">${course.category}</span>
        <span class="tag tag-lvl">${course.level}</span>
        ${enrolled ? `<span class="tag tag-enrolled">✓ Enrolled</span>` : ''}
      </div>
      <h1 class="detail-title">${course.title}</h1>
      <p class="detail-desc">${course.description}</p>
      <div class="detail-meta">
        <div class="detail-meta-item">👨‍🏫 <strong>${course.instructor}</strong></div>
        <div class="detail-meta-item">⏱ <strong>${course.duration}</strong></div>
        <div class="detail-meta-item">📚 <strong>${course.lessons} lessons</strong></div>
        <div class="detail-meta-item">★ <strong>${course.rating}</strong>
          <span style="color:var(--muted)">(${course.students.toLocaleString()} students)</span>
        </div>
      </div>`;

    // ── Completion badge ──
    document.getElementById('completeBadge').innerHTML = pct === 100
      ? `<div class="tag tag-done" style="padding:8px 16px;font-size:0.82rem;display:inline-flex;gap:6px;margin-bottom:20px;">
           🏆 You completed this course!
         </div>`
      : '';

    // ── Lesson list ──
    document.getElementById('lessonList').innerHTML = course.lessonList.map((name, i) => {
      const done = completed.includes(i);
      return `
        <div class="lesson-item ${done ? 'done' : ''}" data-i="${i}">
          <span class="lesson-num">${String(i + 1).padStart(2, '0')}</span>
          <div class="checkbox">${done ? '✓' : ''}</div>
          <span class="lesson-name">${name}</span>
        </div>`;
    }).join('');

    // ── Sidebar ──
    document.getElementById('sideIcon').textContent = course.icon;

    // Enroll button
    const btn = document.getElementById('enrollBtn');
    if (enrolled) {
      btn.textContent = 'Unenroll from Course';
      btn.className = 'btn btn-danger btn-full';
    } else {
      btn.textContent = '🚀 Enroll Now — Free';
      btn.className = 'btn btn-primary btn-full';
    }

    // Sidebar info rows
    document.getElementById('sideRows').innerHTML = `
      <div class="sidebar-row"><span class="label">Duration</span><strong>${course.duration}</strong></div>
      <div class="sidebar-row"><span class="label">Lessons</span><strong>${course.lessons}</strong></div>
      <div class="sidebar-row"><span class="label">Level</span><strong>${course.level}</strong></div>
      <div class="sidebar-row"><span class="label">Instructor</span><strong>${course.instructor}</strong></div>
      <div class="sidebar-row"><span class="label">Rating</span><strong>★ ${course.rating}</strong></div>
      <div class="sidebar-row"><span class="label">Students</span><strong>${course.students.toLocaleString()}</strong></div>
    `;

    // Progress in sidebar (only when enrolled)
    document.getElementById('sideProgress').innerHTML = enrolled ? `
      <div class="prog-wrap" style="margin-top:4px;">
        <div class="prog-labels">
          <span>Your Progress</span>
          <span>${completed.length} / ${course.lessonList.length}</span>
        </div>
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
        <div style="text-align:center;margin-top:10px;font-family:'Poppins',sans-serif;
                    font-size:1.6rem;font-weight:800;color:var(--accent);">${pct}%</div>
      </div>` : '';

    // Certificate (only when 100% done)
    document.getElementById('sideCert').innerHTML = (enrolled && pct === 100) ? `
      <div class="cert-box">
        <h4>🎓 Certificate Earned!</h4>
        <p>Congratulations on completing<br><strong>${course.title}</strong></p>
        <button class="btn btn-outline" style="width:100%;" onclick="downloadCert()">
          Download Certificate
        </button>
      </div>` : '';
  }

  // ── Enroll / Unenroll ──
  document.getElementById('enrollBtn').addEventListener('click', () => {
    if (Storage.isEnrolled(cId)) {
      if (confirm('Unenroll from this course? Your progress will be lost.')) {
        Storage.unenroll(cId);
        toast('Unenrolled from course', '👋');
        render();
      }
    } else {
      Storage.enroll(cId);
      toast(`Enrolled in "${course.title}"!`, '🎉');
      render();
    }
  });

  // ── Lesson checkbox toggle (event delegation) ──
  document.getElementById('lessonList').addEventListener('click', e => {
    const item = e.target.closest('.lesson-item');
    if (!item) return;
    if (!Storage.isEnrolled(cId)) {
      toast('Please enroll first to track lessons', '⚠️');
      return;
    }
    Storage.toggleLesson(cId, parseInt(item.dataset.i));
    if (Storage.getPercent(cId) === 100) {
      toast('🏆 Course complete! Certificate unlocked!', '🏆');
    }
    render();
  });

  // ── Certificate download ──
  function downloadCert() {
    const text =
      `╔════════════════════════════════════════╗\n` +
      `║       CERTIFICATE OF COMPLETION        ║\n` +
      `╚════════════════════════════════════════╝\n\n` +
      `This certifies the successful completion of:\n\n` +
      `  ${course.title}\n\n` +
      `Instructor : ${course.instructor}\n` +
      `Duration   : ${course.duration}\n` +
      `Date       : ${new Date().toLocaleDateString()}\n\n` +
      `LearnFlow — Online Learning Platform`;
    const a = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(new Blob([text], { type: 'text/plain' })),
      download: `certificate-${course.title.replace(/\s+/g, '-').toLowerCase()}.txt`
    });
    a.click();
    toast('Certificate downloaded!', '🎓');
  }

  // ── Init ──
  render();
</script>
</body>
</html>

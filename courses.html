<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Courses — LearnFlow</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="logo">Learn<span>Flow</span></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="courses.html" class="active">Courses</a>
    <a href="dashboard.html">My Courses <span class="badge" id="navBadge">0</span></a>
  </div>
</nav>

<div class="section" style="padding-top:48px;">
  <div class="section-head">
    <h1 class="section-title" style="font-size:1.9rem;">All Courses</h1>
  </div>

  <!-- Toolbar: filters + search -->
  <div class="toolbar">
    <div class="filters" id="filters">
      <button class="filter-btn active" data-cat="All">All</button>
      <button class="filter-btn" data-cat="Programming">Programming</button>
      <button class="filter-btn" data-cat="Design">Design</button>
      <button class="filter-btn" data-cat="Data Science">Data Science</button>
      <button class="filter-btn" data-cat="AI/ML">AI / ML</button>
      <button class="filter-btn" data-cat="DevOps">DevOps</button>
    </div>
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search courses…">
    </div>
  </div>

  <div class="course-grid" id="grid"></div>
  <div class="no-results" id="noResults" style="display:none;">
    <div style="font-size:2.5rem;margin-bottom:12px;">🔍</div>
    No courses match your search.
  </div>
</div>

<footer>Online Learning Platform Project &nbsp;·&nbsp; <span>LearnFlow</span></footer>

<script src="js/data.js"></script>
<script>
  let activeCat = 'All';
  let query = '';

  function updateBadge() {
    document.getElementById('navBadge').textContent = Storage.getEnrolled().length;
  }

  function render() {
    const grid = document.getElementById('grid');
    const noResults = document.getElementById('noResults');

    const list = COURSES.filter(c => {
      const catOk = activeCat === 'All' || c.category === activeCat;
      const q = query.toLowerCase();
      const searchOk = !q || c.title.toLowerCase().includes(q) ||
                       c.description.toLowerCase().includes(q) ||
                       c.category.toLowerCase().includes(q) ||
                       c.instructor.toLowerCase().includes(q);
      return catOk && searchOk;
    });

    if (list.length === 0) {
      grid.innerHTML = '';
      noResults.style.display = 'block';
      return;
    }
    noResults.style.display = 'none';

    grid.innerHTML = list.map(c => {
      const enrolled = Storage.isEnrolled(c.id);
      const pct = Storage.getPercent(c.id);
      return `
      <a href="course-detail.html?id=${c.id}" class="course-card fade-up">
        <div class="card-banner" style="background:${c.color}1A;">${c.icon}</div>
        <div class="card-body">
          <div class="card-tags">
            <span class="tag tag-cat">${c.category}</span>
            <span class="tag tag-lvl">${c.level}</span>
            ${enrolled ? `<span class="tag tag-enrolled">✓ Enrolled</span>` : ''}
          </div>
          <div class="card-title">${c.title}</div>
          <div class="card-desc">${c.description}</div>
          ${enrolled ? `
            <div class="prog-wrap">
              <div class="prog-labels"><span>Progress</span><span>${pct}%</span></div>
              <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
            </div>` : ''}
          <div class="card-footer">
            <span style="color:var(--muted);font-size:0.78rem;">${c.instructor}</span>
            <span class="card-rating">★ ${c.rating}</span>
          </div>
        </div>
      </a>`;
    }).join('');
  }

  // Filter buttons
  document.getElementById('filters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCat = btn.dataset.cat;
    render();
  });

  // Search
  document.getElementById('searchInput').addEventListener('input', e => {
    query = e.target.value;
    render();
  });

  updateBadge();
  render();
</script>
</body>
</html>

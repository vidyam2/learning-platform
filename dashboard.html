<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Courses — LearnFlow</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="logo">Learn<span>Flow</span></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="courses.html">Courses</a>
    <a href="dashboard.html" class="active">My Courses <span class="badge" id="navBadge">0</span></div>
  </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <a href="courses.html" class="back-link">← Browse Courses</a>
  <h1>My Courses</h1>
  <p>Track your learning progress and resume where you left off.</p>
  <div class="stats-row" id="statsRow"></div>
</div>

<!-- CONTENT -->
<div class="section" style="padding-top:0;">
  <!-- Overall progress bar -->
  <div id="overallBar"></div>
  <!-- Enrolled course cards -->
  <div class="course-grid" id="dashGrid"></div>
  <!-- Empty state -->
  <div class="empty" id="emptyState" style="display:none;">
    <div class="empty-icon">📚</div>
    <h3>No courses yet</h3>
    <p>Enroll in your first course to start tracking progress.</p>
    <a href="courses.html" class="btn btn-primary">Browse Courses &rarr;</a>
  </div>
</div>

<footer>Online Learning Platform Project &nbsp;·&nbsp; <span>LearnFlow</span></footer>

<div class="toast" id="toast">
  <span class="toast-icon" id="toastIcon">✓</span>
  <span id="toastMsg"></span>
</div>

<script src="js/data.js"></script>
<script>
  function toast(msg, icon = '✓') {
    document.getElementById('toastMsg').textContent  = msg;
    document.getElementById('toastIcon').textContent = icon;
    const el = document.getElementById('toast');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3500);
  }

  function render() {
    const ids = Storage.getEnrolled();
    document.getElementById('navBadge').textContent = ids.length;

    if (ids.length === 0) {
      document.getElementById('statsRow').innerHTML   = '';
      document.getElementById('overallBar').innerHTML = '';
      document.getElementById('dashGrid').innerHTML   = '';
      document.getElementById('emptyState').style.display = 'block';
      return;
    }

    document.getElementById('emptyState').style.display = 'none';

    const enrolled   = COURSES.filter(c => ids.includes(c.id));
    const totalL     = enrolled.reduce((s, c) => s + c.lessonList.length, 0);
    const doneL      = enrolled.reduce((s, c) => s + Storage.getCompletedLessons(c.id).length, 0);
    const doneCourses= enrolled.filter(c => Storage.getPercent(c.id) === 100).length;
    const overallPct = totalL > 0 ? Math.round((doneL / totalL) * 100) : 0;

    // ── Stats cards ──
    document.getElementById('statsRow').innerHTML = `
      <div class="stat-card">
        <div class="num">${ids.length}</div>
        <div class="lbl">Enrolled</div>
      </div>
      <div class="stat-card">
        <div class="num">${doneL}</div>
        <div class="lbl">Lessons Done</div>
      </div>
      <div class="stat-card">
        <div class="num">${doneCourses}</div>
        <div class="lbl">Completed</div>
      </div>
      <div class="stat-card">
        <div class="num accent">${overallPct}%</div>
        <div class="lbl">Overall Progress</div>
      </div>
    `;

    // ── Overall bar ──
    document.getElementById('overallBar').innerHTML = `
      <div style="margin-bottom:36px;">
        <div class="prog-labels" style="font-size:0.82rem;margin-bottom:8px;">
          <span style="color:var(--muted);">Overall Progress</span>
          <span style="color:var(--muted);">${doneL} / ${totalL} lessons</span>
        </div>
        <div class="prog-bar" style="height:8px;">
          <div class="prog-fill" style="width:${overallPct}%"></div>
        </div>
      </div>`;

    // ── Course cards ──
    document.getElementById('dashGrid').innerHTML = enrolled.map(c => {
      const pct   = Storage.getPercent(c.id);
      const done  = Storage.getCompletedLessons(c.id).length;
      const isComplete = pct === 100;
      return `
      <div class="dash-card fade-up">
        <div class="dash-card-top-bar" style="background:${c.color};opacity:0.7;"></div>
        <div class="dash-card-body">
          <div class="dash-icon">${c.icon}</div>
          <div class="dash-card-info">
            <div class="card-tags" style="margin-bottom:8px;">
              <span class="tag tag-cat">${c.category}</span>
              ${isComplete ? `<span class="tag tag-done">✓ Complete</span>` : ''}
            </div>
            <div class="dash-card-title">${c.title}</div>
            <div class="prog-wrap">
              <div class="prog-labels">
                <span>${done} of ${c.lessonList.length} lessons</span>
                <span style="font-weight:700;color:var(--accent);">${pct}%</span>
              </div>
              <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
            </div>
            <div class="dash-actions">
              <a href="course-detail.html?id=${c.id}" class="btn btn-primary" style="padding:8px 16px;font-size:0.82rem;">
                ${isComplete ? '📖 Review' : '▶ Continue'}
              </a>
              <button class="btn btn-outline" style="padding:8px 16px;font-size:0.82rem;"
                onclick="resetCourse(${c.id}, '${c.title.replace(/'/g,"\\'")}')">
                ↺ Reset
              </button>
              ${isComplete ? `
                <button class="btn btn-outline" style="padding:8px 16px;font-size:0.82rem;"
                  onclick="downloadCert(${c.id})">🎓 Certificate</button>` : ''}
            </div>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  function resetCourse(id, title) {
    if (!confirm(`Reset all progress for "${title}"?`)) return;
    const p = Storage.getProgress();
    delete p[id];
    Storage.saveProgress(p);
    toast(`Progress reset for "${title}"`, '↺');
    render();
  }

  function downloadCert(id) {
    const c = COURSES.find(x => x.id === id);
    const text =
      `╔════════════════════════════════════════╗\n` +
      `║       CERTIFICATE OF COMPLETION        ║\n` +
      `╚════════════════════════════════════════╝\n\n` +
      `This certifies the successful completion of:\n\n` +
      `  ${c.title}\n\n` +
      `Instructor : ${c.instructor}\n` +
      `Duration   : ${c.duration}\n` +
      `Date       : ${new Date().toLocaleDateString()}\n\n` +
      `LearnFlow — Online Learning Platform`;
    const a = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(new Blob([text], { type: 'text/plain' })),
      download: `certificate-${c.title.replace(/\s+/g, '-').toLowerCase()}.txt`
    });
    a.click();
    toast('Certificate downloaded!', '🎓');
  }

  render();
</script>
</body>
</html>
